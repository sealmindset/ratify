# =============================================================================
# Docker Compose -- Ratify
# =============================================================================
# Generated by /make-it scaffold (fastapi-nextjs)
#
# Usage:
#   docker compose --profile dev up --build
#
# Placeholders (replaced during /make-it build phase):
#   Ratify          - human-readable app name
#   ratify          - kebab-case app name (e.g., deliver-it)
#   3100     - host port for frontend (e.g., 3100)
#   8000      - host port for backend (e.g., 8100)
#   5500           - host port for PostgreSQL (e.g., 5500)
#   10090    - host port for mock-oidc (e.g., 10190)
#   [ADDITIONAL_SERVICE_URLS]    - extra env vars for integrations
#   [ADDITIONAL_MOCK_SERVICES]   - extra mock service definitions
# =============================================================================

services:
  # --------------------------------------------------------------------------
  # Frontend (Next.js)
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3100:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - BACKEND_INTERNAL_URL=http://backend:8000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Backend (FastAPI)
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      mock-oidc:
        condition: service_healthy
      mock-jira:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://ratify:ratify@db:5432/ratify
      - OIDC_ISSUER_URL=http://mock-oidc:10090
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-mock-oidc-client}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-mock-oidc-secret}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=http://localhost:3100
      - BACKEND_URL=http://localhost:8000
      - JIRA_BASE_URL=http://mock-jira:8543
      - JIRA_AUTH_TOKEN=mock-jira-token
      - AI_PROVIDER=${AI_PROVIDER:-anthropic_foundry}
      - AI_MODEL_HEAVY=${AI_MODEL_HEAVY:-claude-opus-4-6}
      - AI_MODEL_STANDARD=${AI_MODEL_STANDARD:-claude-sonnet-4-6}
      - AI_MODEL_LIGHT=${AI_MODEL_LIGHT:-claude-haiku-4-5}
      - AZURE_AI_FOUNDRY_ENDPOINT=${AZURE_AI_FOUNDRY_ENDPOINT:-}
      - AZURE_AI_FOUNDRY_API_KEY=${AZURE_AI_FOUNDRY_API_KEY:-}
      - AI_RATE_LIMIT_REQUESTS_PER_MINUTE=${AI_RATE_LIMIT_REQUESTS_PER_MINUTE:-20}
      - AI_RATE_LIMIT_TOKENS_PER_MINUTE=${AI_RATE_LIMIT_TOKENS_PER_MINUTE:-50000}
      - AI_MAX_PROMPT_CHARS=${AI_MAX_PROMPT_CHARS:-100000}
      - LOG_BUFFER_SIZE=${LOG_BUFFER_SIZE:-10000}
      - ENFORCE_SECRETS=${ENFORCE_SECRETS:-false}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Database (PostgreSQL)
  # --------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    ports:
      - "5500:5432"
    environment:
      - POSTGRES_USER=ratify
      - POSTGRES_PASSWORD=ratify
      - POSTGRES_DB=ratify
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ratify"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Mock OIDC Provider (local dev only)
  # --------------------------------------------------------------------------
  mock-oidc:
    build:
      context: ./mock-services/mock-oidc
      dockerfile: Dockerfile
    ports:
      - "10090:10090"
    profiles:
      - dev
    environment:
      - MOCK_OIDC_PORT=10090
      - MOCK_OIDC_EXTERNAL_BASE_URL=http://localhost:10090
      - MOCK_OIDC_INTERNAL_BASE_URL=http://mock-oidc:10090
      - MOCK_OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-mock-oidc-client}
      - MOCK_OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-mock-oidc-secret}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:10090/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Mock Jira (local dev only)
  # --------------------------------------------------------------------------
  mock-jira:
    build:
      context: ./mock-services/mock-jira
      dockerfile: Dockerfile
    ports:
      - "8543:8543"
    profiles:
      - dev
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8543/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
